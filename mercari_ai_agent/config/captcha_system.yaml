# CAPTCHA 人机交互系统配置文件
# 该文件定义了验证码处理系统的所有配置项

# 系统基本设置
system:
  name: "CAPTCHA Human-Computer Interaction System"
  version: "1.0.0"
  debug: false
  log_level: "INFO"
  
# 验证码检测器配置
detector:
  # 检测置信度阈值 (0.0-1.0)
  confidence_threshold: 0.7
  
  # 启用的检测方法
  detection_methods:
    rule_based: true
    image_based: true
    ml_based: false  # 需要额外的ML模型
    dom_based: true
  
  # 规则检测配置
  rule_detection:
    # 验证码关键词
    keywords:
      - "captcha"
      - "verification"
      - "verify"
      - "code"
      - "challenge"
      - "验证码"
      - "验证"
      - "确认"
    
    # 图片特征
    image_patterns:
      - "captcha\\.(jpg|jpeg|png|gif)"
      - "verify\\.(jpg|jpeg|png|gif)"
      - "code\\.(jpg|jpeg|png|gif)"
    
    # 输入框模式
    input_patterns:
      - "name=['\"]?captcha['\"]?"
      - "name=['\"]?verify['\"]?"
      - "name=['\"]?code['\"]?"
      - "placeholder.*验证码"
      - "placeholder.*verification"
  
  # 图像检测配置
  image_detection:
    # 图像分析阈值
    noise_threshold: 0.3
    distortion_threshold: 0.4
    
    # 支持的图像格式
    supported_formats:
      - "jpeg"
      - "jpg"
      - "png"
      - "gif"
      - "bmp"
    
    # 图像处理设置
    preprocessing:
      grayscale: true
      normalize: true
      denoise: true
  
  # DOM检测配置
  dom_detection:
    # 检测元素
    target_elements:
      - "img"
      - "input"
      - "button"
      - "div"
      - "span"
    
    # 属性检测
    attribute_patterns:
      - "class.*captcha"
      - "id.*captcha"
      - "class.*verify"
      - "id.*verify"

# 用户界面管理器配置
ui:
  # 默认UI框架 (tkinter, qt, web, mock)
  framework: "tkinter"
  
  # 界面超时时间（秒）
  timeout: 300
  
  # 界面设置
  settings:
    window_title: "CAPTCHA验证 - Mercari助手"
    window_size: "800x600"
    resizable: true
    
  # 各框架特定配置
  frameworks:
    tkinter:
      theme: "default"
      font_family: "Arial"
      font_size: 12
      
    qt:
      style: "Fusion"
      font_family: "Microsoft YaHei"
      font_size: 12
      
    web:
      port: 8080
      host: "localhost"
      template_dir: "templates"
      static_dir: "static"
      
    mock:
      auto_solve: false
      delay: 2.0

# 任务队列配置
task_queue:
  # 队列最大大小
  max_size: 1000
  
  # 任务超时时间（秒）
  task_timeout: 600
  
  # 重试设置
  retry:
    max_attempts: 3
    delay: 5.0
    backoff_factor: 2.0
  
  # 优先级设置
  priority:
    high: 1
    normal: 5
    low: 10
  
  # 持久化设置
  persistence:
    enabled: true
    file_path: "data/task_queue.json"
    save_interval: 30

# 验证码求解器配置
# 此配置部分实现强制人机交互模式，确保所有验证码处理都需要人工参与
solver:
  # 求解超时时间（秒）
  timeout: 60
  
  # 人工求解配置 - 强制启用，确保所有验证码都需要人工处理
  human_solver:
    enabled: true                    # 启用人工求解器
    force_enabled: true             # 强制启用标识，禁止程序性禁用
    max_attempts: 3                 # 最大尝试次数
    hint_enabled: true              # 启用提示功能
    manual_confirmation_required: true  # 要求手动确认每个验证码答案
    
  # 自动求解配置 - 强制禁用，防止任何自动化验证码处理
  auto_solver:
    enabled: false                  # 禁用自动求解器
    force_disabled: true           # 强制禁用标识，禁止程序性启用
    api_key: ""                    # 清空API密钥
    service_url: ""                # 清空服务URL
    bypass_protection: false       # 禁用绕过保护
    
  # 缓存配置
  cache:
    enabled: true
    ttl: 3600
    max_size: 100

# 反自动化配置
# 此部分配置用于防止任何形式的自动化验证码处理，确保系统的合规性
anti_automation:
  # 严格模式 - 启用最严格的反自动化检查
  strict_mode: true
  
  # 禁用所有自动化 - 全面禁用任何可能的自动化功能
  disable_all_automation: true
  
  # 强制人机交互 - 确保每个验证码都需要真实的人工处理
  force_human_interaction: true
  
  # 检测配置
  detection:
    # 监控自动化行为
    monitor_automation_attempts: true
    
    # 检测自动化工具
    detect_automation_tools: true
    
    # 阻止程序化输入
    block_programmatic_input: true
    
    # 验证人工操作
    verify_human_interaction: true
  
  # 保护措施
  protection:
    # 防止API滥用
    prevent_api_abuse: true
    
    # 阻止脚本访问
    block_script_access: true
    
    # 限制请求频率
    rate_limiting: true
    
    # 检查用户代理
    check_user_agent: true

# 合规性配置
# 此部分配置确保系统符合法律法规和道德准则
compliance:
  # 仅限人机交互 - 确保所有验证码处理都是合法的人工操作
  human_interaction_only: true
  
  # 禁止验证码破解 - 明确禁止任何形式的验证码破解行为
  no_captcha_breaking: true
  
  # 透明处理 - 确保所有操作都是透明和可审计的
  transparent_processing: true
  
  # 法律合规
  legal_compliance:
    # 遵守服务条款
    respect_terms_of_service: true
    
    # 遵守网站政策
    respect_website_policies: true
    
    # 禁止恶意行为
    no_malicious_activities: true
    
    # 保护用户隐私
    protect_user_privacy: true
  
  # 道德准则
  ethical_guidelines:
    # 诚信原则
    integrity_principle: true
    
    # 责任原则
    responsibility_principle: true
    
    # 尊重原则
    respect_principle: true
    
    # 公平原则
    fairness_principle: true
  
  # 审计配置
  audit:
    # 启用审计日志
    enable_audit_logs: true
    
    # 记录所有操作
    log_all_operations: true
    
    # 保留审计记录
    retain_audit_records: true
    
    # 审计记录保留期（天）
    audit_retention_days: 90

# 工作流配置
workflow:
  # 处理步骤配置
  steps:
    detection:
      enabled: true
      timeout: 10
      
    ui_display:
      enabled: true
      timeout: 300
      
    user_input:
      enabled: true
      timeout: 300
      
    verification:
      enabled: true
      timeout: 30
      
    recovery:
      enabled: true
      timeout: 60
  
  # 恢复机制配置
  recovery:
    max_attempts: 3
    strategies:
      - "refresh_captcha"
      - "clear_cache"
      - "reset_session"
    
    # 恢复延迟
    delay: 2.0
    
    # 失败处理
    failure_handling:
      log_errors: true
      notify_user: true
      fallback_action: "skip"

# 分析系统配置
analytics:
  # 启用数据收集
  enabled: true
  
  # 数据持久化
  persistence:
    enabled: true
    database_path: "data/captcha_analytics.db"
    table_name: "captcha_events"
    
  # 报告生成
  reporting:
    enabled: true
    report_interval: 3600  # 1小时
    report_path: "reports"
    
  # 统计指标
  metrics:
    - "detection_accuracy"
    - "solving_success_rate"
    - "average_solving_time"
    - "captcha_type_distribution"
    - "ui_interaction_time"
    
  # 数据保留
  retention:
    enabled: true
    days: 30

# 系统集成配置
integration:
  # 与现有系统集成
  mercari_scraper:
    enabled: true
    integration_mode: "seamless"  # seamless, explicit
    
  # 反机器人处理器集成
  anti_bot_handler:
    enabled: true
    replace_methods: true
    backup_original: true
    
  # 会话管理器集成
  session_manager:
    enabled: true
    captcha_session_key: "captcha_state"
    
  # 钩子配置
  hooks:
    pre_request: []
    post_request: ["check_captcha"]
    on_captcha_detected: ["pause_scraping", "notify_user"]
    on_captcha_solved: ["resume_scraping", "update_stats"]

# 日志配置
logging:
  # 日志级别
  level: "INFO"
  
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # 日志文件
  file:
    enabled: true
    path: "logs/captcha_system.log"
    max_size: "10MB"
    backup_count: 5
    
  # 控制台输出
  console:
    enabled: true
    level: "INFO"
    
  # 特定组件日志
  components:
    detector: "DEBUG"
    ui_manager: "INFO"
    solver: "INFO"
    workflow: "INFO"
    analytics: "INFO"

# 安全配置
security:
  # 输入验证
  input_validation:
    enabled: true
    max_input_length: 1000
    sanitize_html: true
    
  # 数据加密
  encryption:
    enabled: false
    key_file: "config/encryption.key"
    
  # 访问控制
  access_control:
    enabled: false
    allowed_hosts: ["localhost", "127.0.0.1"]

# 性能配置
performance:
  # 并发设置
  concurrency:
    max_workers: 4
    detection_workers: 2
    ui_workers: 1
    analysis_workers: 1
    
  # 缓存配置
  caching:
    enabled: true
    cache_size: 1000
    ttl: 3600
    
  # 资源限制
  limits:
    max_memory_mb: 512
    max_cpu_percent: 80
    max_disk_space_mb: 1024

# 开发和调试配置
development:
  # 调试模式
  debug: false
  
  # 测试配置
  testing:
    mock_captcha: false
    auto_solve: false
    test_data_path: "test_data"
    
  # 性能监控
  profiling:
    enabled: false
    profile_path: "profiles"
    
  # 开发服务器
  dev_server:
    enabled: false
    host: "localhost"
    port: 8888
    auto_reload: true

# 部署配置
deployment:
  # 环境设置
  environment: "production"  # development, testing, production
  
  # 服务配置
  service:
    name: "captcha-system"
    description: "CAPTCHA Human-Computer Interaction System"
    
  # 健康检查
  health_check:
    enabled: true
    interval: 60
    timeout: 10
    
  # 监控配置
  monitoring:
    enabled: true
    metrics_port: 9090
    dashboard_enabled: false