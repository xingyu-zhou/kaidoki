# Cookie管理策略配置
# 
# 此文件定义了智能Cookie管理系统的策略和规则
# 支持域名特定的Cookie策略和动态规则学习

# 全局配置
global_config:
  # 基础设置
  learning_enabled: true
  learning_threshold: 0.8
  adaptation_rate: 0.1
  
  # 性能设置
  max_cookies: 10000
  cleanup_interval: 300  # 5分钟
  monitoring_enabled: true
  
  # Cookie保留策略
  preserve_critical_cookies: true
  preserve_important_cookies: true
  preserve_optional_cookies: true
  filter_blacklist_cookies: true
  filter_expired_cookies: true
  
  # 默认行为
  default_category: "optional"
  default_action: "allow"
  strict_mode: false

# 域名特定配置
domain_configs:
  # Mercari相关域名
  "mercari.com":
    strict_mode: true
    preserve_optional_cookies: true
    custom_rules:
      - name_pattern: "mercari_session"
        category: "important"
        priority: 85
        description: "Mercari会话Cookie"
      - name_pattern: "mercari_csrf"
        category: "important"
        priority: 80
        description: "Mercari CSRF令牌"
  
  "jp.mercari.com":
    strict_mode: true
    preserve_optional_cookies: true
    custom_rules:
      - name_pattern: "jp_session"
        category: "important"
        priority: 85
        description: "日本站会话Cookie"
  
  # 通用电商域名
  "*.amazon.com":
    strict_mode: false
    preserve_optional_cookies: true
    custom_rules:
      - name_pattern: "session-id"
        category: "important"
        priority: 85
        description: "Amazon会话ID"
  
  # 测试和开发域名
  "localhost":
    strict_mode: false
    preserve_optional_cookies: true
    learning_enabled: true
  
  "127.0.0.1":
    strict_mode: false
    preserve_optional_cookies: true
    learning_enabled: true

# Cookie分类规则
cookie_rules:
  # 关键安全Cookie（最高优先级）
  critical_cookies:
    # Cloudflare保护Cookie
    - name_pattern: "__cf_bm"
      domain_pattern: ".*"
      category: "critical"
      priority: 100
      action: "preserve"
      description: "Cloudflare Bot管理令牌"
    
    - name_pattern: "_cfuvid"
      domain_pattern: ".*"
      category: "critical"
      priority: 100
      action: "preserve"
      description: "Cloudflare用户验证标识"
    
    - name_pattern: "cf_clearance"
      domain_pattern: ".*"
      category: "critical"
      priority: 100
      action: "preserve"
      description: "Cloudflare挑战通过证明"
    
    - name_pattern: "__cfruid"
      domain_pattern: ".*"
      category: "critical"
      priority: 100
      action: "preserve"
      description: "Cloudflare请求标识符"
    
    # CAPTCHA相关Cookie
    - name_pattern: ".*captcha.*"
      domain_pattern: ".*"
      category: "critical"
      priority: 95
      action: "preserve"
      description: "CAPTCHA相关令牌"
    
    - name_pattern: ".*recaptcha.*"
      domain_pattern: ".*"
      category: "critical"
      priority: 95
      action: "preserve"
      description: "reCAPTCHA相关令牌"
    
    - name_pattern: ".*hcaptcha.*"
      domain_pattern: ".*"
      category: "critical"
      priority: 95
      action: "preserve"
      description: "hCAPTCHA相关令牌"
    
    # 反机器人保护Cookie
    - name_pattern: ".*bot.*protection.*"
      domain_pattern: ".*"
      category: "critical"
      priority: 95
      action: "preserve"
      description: "反机器人保护令牌"
    
    - name_pattern: ".*verify.*"
      domain_pattern: ".*"
      category: "critical"
      priority: 90
      action: "preserve"
      description: "验证相关令牌"
    
    - name_pattern: ".*challenge.*"
      domain_pattern: ".*"
      category: "critical"
      priority: 90
      action: "preserve"
      description: "挑战相关令牌"

  # 重要功能Cookie（高优先级）
  important_cookies:
    # 会话管理Cookie
    - name_pattern: "session_id|JSESSIONID|PHPSESSID|ASP\\.NET_SessionId"
      domain_pattern: ".*"
      category: "important"
      priority: 85
      action: "preserve"
      description: "标准会话管理Cookie"
    
    - name_pattern: "_session|sessionid|sid"
      domain_pattern: ".*"
      category: "important"
      priority: 85
      action: "preserve"
      description: "会话相关Cookie"
    
    # CSRF保护Cookie
    - name_pattern: "csrf_token|_csrf|xsrf_token"
      domain_pattern: ".*"
      category: "important"
      priority: 80
      action: "preserve"
      description: "CSRF保护令牌"
    
    # 身份验证Cookie
    - name_pattern: ".*auth.*"
      domain_pattern: ".*"
      category: "important"
      priority: 75
      action: "preserve"
      description: "身份验证相关Cookie"
    
    - name_pattern: ".*login.*"
      domain_pattern: ".*"
      category: "important"
      priority: 75
      action: "preserve"
      description: "登录相关Cookie"
    
    - name_pattern: ".*user.*"
      domain_pattern: ".*"
      category: "important"
      priority: 70
      action: "preserve"
      description: "用户相关Cookie"
    
    - name_pattern: ".*token.*"
      domain_pattern: ".*"
      category: "important"
      priority: 70
      action: "preserve"
      description: "令牌相关Cookie"
    
    # 安全相关Cookie
    - name_pattern: ".*security.*"
      domain_pattern: ".*"
      category: "important"
      priority: 75
      action: "preserve"
      description: "安全相关Cookie"

  # 可选功能Cookie（中优先级）
  optional_cookies:
    # 偏好设置Cookie
    - name_pattern: ".*preference.*|.*setting.*"
      domain_pattern: ".*"
      category: "optional"
      priority: 60
      action: "preserve"
      description: "偏好设置Cookie"
    
    # 语言和区域Cookie
    - name_pattern: ".*lang.*|.*language.*|.*locale.*"
      domain_pattern: ".*"
      category: "optional"
      priority: 55
      action: "preserve"
      description: "语言和区域Cookie"
    
    # 购物车Cookie
    - name_pattern: ".*cart.*|.*basket.*"
      domain_pattern: ".*"
      category: "optional"
      priority: 60
      action: "preserve"
      description: "购物车相关Cookie"
    
    # 主题和显示Cookie
    - name_pattern: ".*theme.*|.*display.*"
      domain_pattern: ".*"
      category: "optional"
      priority: 50
      action: "preserve"
      description: "主题和显示Cookie"

  # 黑名单Cookie（需要过滤）
  blacklist_cookies:
    # 追踪Cookie
    - name_pattern: ".*tracking.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "追踪Cookie"
    
    - name_pattern: ".*analytics.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "分析Cookie"
    
    # 广告Cookie
    - name_pattern: ".*ads.*|.*advertising.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "广告Cookie"
    
    - name_pattern: ".*marketing.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "营销Cookie"
    
    # 第三方追踪Cookie
    - name_pattern: ".*facebook.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "Facebook追踪Cookie"
    
    - name_pattern: ".*google.*analytics.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "Google Analytics Cookie"
    
    - name_pattern: ".*doubleclick.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "DoubleClick Cookie"
    
    - name_pattern: "_ga|_gid|_gat"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "Google Analytics Cookie"
    
    # 其他已知有害Cookie
    - name_pattern: ".*malware.*|.*virus.*"
      domain_pattern: ".*"
      category: "blacklist"
      priority: 0
      action: "filter"
      description: "恶意软件相关Cookie"

# 动态学习配置
learning_config:
  # 学习参数
  enable_learning: true
  learning_rate: 0.1
  confidence_threshold: 0.8
  min_samples: 10
  
  # 适应性参数
  adaptation_window: 86400  # 24小时
  decay_factor: 0.95
  stability_threshold: 0.9
  
  # 规则更新策略
  auto_promote_rules: true
  auto_demote_rules: true
  max_dynamic_rules: 1000
  
  # 学习指标
  success_metrics:
    - "captcha_success_rate"
    - "session_stability"
    - "request_success_rate"
    - "error_rate"
  
  # 学习触发条件
  learning_triggers:
    - metric: "captcha_success_rate"
      threshold: 0.8
      action: "promote_critical"
    - metric: "session_stability"
      threshold: 0.9
      action: "promote_important"
    - metric: "error_rate"
      threshold: 0.2
      action: "demote_optional"

# 监控和报警配置
monitoring_config:
  # 监控开关
  enable_monitoring: true
  enable_alerts: true
  
  # 性能监控
  performance_metrics:
    - "processing_time"
    - "memory_usage"
    - "cache_hit_rate"
    - "filter_efficiency"
  
  # 报警阈值
  alert_thresholds:
    processing_time: 1.0  # 秒
    memory_usage: 100000000  # 字节
    cache_hit_rate: 0.8
    filter_efficiency: 0.9
    error_rate: 0.1
  
  # 报告配置
  report_interval: 3600  # 1小时
  report_format: "json"
  enable_detailed_logs: false

# 缓存配置
cache_config:
  # 缓存开关
  enable_cache: true
  cache_type: "memory"  # memory, redis, file
  
  # 缓存参数
  max_cache_size: 1000
  cache_ttl: 3600  # 1小时
  cache_cleanup_interval: 300  # 5分钟
  
  # 缓存策略
  cache_strategy: "lru"  # lru, lfu, fifo
  cache_compression: false
  cache_encryption: false

# 安全配置
security_config:
  # 安全开关
  enable_security_validation: true
  enable_cookie_signing: false
  enable_cookie_encryption: false
  
  # 安全参数
  max_cookie_size: 4096
  max_cookie_count: 1000
  validate_cookie_format: true
  sanitize_cookie_values: true
  
  # 安全策略
  block_suspicious_cookies: true
  quarantine_unknown_cookies: false
  log_security_events: true

# 导出配置
export_config:
  # 导出开关
  enable_export: true
  export_format: "json"  # json, yaml, csv
  
  # 导出内容
  export_rules: true
  export_stats: true
  export_performance: true
  export_learned_rules: true
  
  # 导出计划
  auto_export: true
  export_interval: 86400  # 24小时
  export_retention: 604800  # 7天

# 版本信息
version: "1.0.0"
created_at: "2025-01-26T15:52:00Z"
updated_at: "2025-01-26T15:52:00Z"