# Mercari AI Agent Docker Compose配置
# 用于本地开发和测试环境的容器编排

version: '3.8'

services:
  # 主应用服务
  mercari-ai-agent:
    build: .
    container_name: mercari-ai-agent
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=mercari_agent_pass
    env_file:
      - config/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - mercari-network

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: mercari-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mercari-network

  # PostgreSQL数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: mercari-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mercari_agent
      - POSTGRES_USER=mercari_agent
      - POSTGRES_PASSWORD=mercari_agent_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - mercari-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: mercari-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - mercari-ai-agent
    restart: unless-stopped
    networks:
      - mercari-network

  # 监控服务 (可选)
  prometheus:
    image: prom/prometheus:latest
    container_name: mercari-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - mercari-network
    profiles:
      - monitoring

  # Grafana仪表板 (可选)
  grafana:
    image: grafana/grafana:latest
    container_name: mercari-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - mercari-network
    profiles:
      - monitoring

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  mercari-network:
    driver: bridge

# 开发环境配置
# 使用方法：
# 1. 开发环境: docker-compose up -d
# 2. 包含监控: docker-compose --profile monitoring up -d
# 3. 仅主服务: docker-compose up -d mercari-ai-agent redis postgres