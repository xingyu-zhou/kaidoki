[tool:pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --disable-warnings
    --color=yes
    --verbose

# 异步测试支持
asyncio_mode = auto

# 标记定义
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试
    network: 需要网络连接的测试
    browser: 需要浏览器的测试
    ml: 机器学习相关测试
    antibot: 反爬虫测试
    scraper: 爬虫测试
    parser: 解析器测试
    session: 会话管理测试
    utils: 工具测试

# 最小版本要求
minversion = 7.0

# 测试超时
timeout = 300

# 覆盖率配置
[coverage:run]
source = src/mercari_agent
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*
    */conftest.py
    */setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml